{% extends 'base.html' %}

{% block title %}New Customer | ZLAGODA AIS{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0"> Register a new customer</h4>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('customer_card.add_customer') }}">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Surname</label>
                        <input type="text" name="cust_surname" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" name="cust_name" class="form-control" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone number</label>
                    <input type="text" name="phone_number" class="form-control" required placeholder="+380...">
                </div>
                <div class="mb-3">
                    <label class="form-label">Discount percentage (%)</label>
                    <input type="number" name="percent" class="form-control" min="0" max="100" required>
                </div>
                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('customer_card.manage_customers') }}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-success">Save customer</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
