{% extends 'base.html' %}

{% block title %}Edit product{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Edit product: {{ product.product_name }}</h4>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('product.edit_product', id_product=product.id_product) }}">

                <div class="mb-3">
                    <label class="form-label">Category <span class="text-danger">*</span></label>
                    <select name="category_number" class="form-select" required>
                        <option value="">Choose category</option>
                        {% for cat in categories %}
                        <option value="{{ cat.category_number }}"
                            {% if cat.category_number == product.category_number %}selected{% endif %}>
                            {{ cat.category_name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Product name <span class="text-danger">*</span></label>
                    <input type="text" name="product_name" class="form-control"
                           value="{{ product.product_name }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Characteristics</label>
                    <textarea name="characteristics" class="form-control" rows="3"
                              placeholder="Product description, weight, composition...">{{ product.characteristics or '' }}</textarea>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('product.manage_products') }}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-success">Save changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
