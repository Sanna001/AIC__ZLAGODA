<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ZLAGODA AIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="login-avatar">
        </div>

        <div class="login-logo">
            <h1>ZLAGODA AIS</h1>
            <p>Log in to access the system</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.login') }}" method="POST" class="form-grid">
            
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Surname</label>
                    <input type="text" name="surname" class="form-control"
                           placeholder="Surname" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control"
                           placeholder="Name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Patronymic</label>
                    <input type="text" name="patronymic" class="form-control"
                           placeholder="Patronymic" required>
                </div>
            </div>

            <div class="full-width-row">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn btn-login">Sign in</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
