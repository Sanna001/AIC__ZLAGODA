{% extends 'base.html' %}

{% block title %}Додати товар | АІС Злагода{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">➕ Додати новий товар до каталогу</h4>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('product.add_product') }}">
                
                <div class="mb-3">
                    <label class="form-label">Категорія</label>
                    <select name="category_number" class="form-select" required>
                        <option value="">-- Оберіть категорію --</option>
                        {% for cat in categories %}
                        <option value="{{ cat.category_number }}">{{ cat.category_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Назва товару</label>
                    <input type="text" name="product_name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Характеристики</label>
                    <textarea name="characteristics" class="form-control" rows="3" placeholder="Опис товару, вага, склад..."></textarea>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('product.manage_products') }}" class="btn btn-secondary">Скасувати</a>
                    <button type="submit" class="btn btn-success">Зберегти товар</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
