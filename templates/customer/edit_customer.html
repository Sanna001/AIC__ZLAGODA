{% extends 'base.html' %}

{% block title %}Редагувати клієнта | АІС Злагода{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-warning text-dark">
            <h4 class="mb-0">✏️ Редагування даних клієнта</h4>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('customer_card.edit_customer', card_number=customer.card_number) }}">
                <div class="mb-3">
                    <label class="form-label">Номер картки (не редагується)</label>
                    <input type="text" class="form-control" value="{{ customer.card_number }}" disabled>
                    <input type="hidden" name="card_number" value="{{ customer.card_number }}">
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Прізвище</label>
                        <input type="text" name="cust_surname" class="form-control" value="{{ customer.cust_surname }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Ім'я</label>
                        <input type="text" name="cust_name" class="form-control" value="{{ customer.cust_name }}" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Телефон</label>
                    <input type="text" name="phone_number" class="form-control" value="{{ customer.phone_number }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Відсоток знижки (%)</label>
                    <input type="number" name="percent" class="form-control" value="{{ customer.percent }}" min="0" max="100" required>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('customer_card.manage_customers') }}" class="btn btn-secondary">Скасувати</a>
                    <button type="submit" class="btn btn-warning">💾 Зберегти зміни</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
