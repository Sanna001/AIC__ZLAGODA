{% extends 'base.html' %}

{% block title %}Edit customer{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-warning text-dark">
            <h4 class="mb-0">Editing customer data</h4>
        </div>
        <div class="card-body">
           <form method="POST" action="{{ url_for('customer_card.edit_customer', card_id=customer.card_number) }}">
                
                <div class="mb-3">
                    <label class="form-label">Card number</label>
                    <input type="text" class="form-control" value="{{ customer.card_number }}" disabled>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Surname</label>
                        <input type="text" name="cust_surname" class="form-control" value="{{ customer.cust_surname }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" name="cust_name" class="form-control" value="{{ customer.cust_name }}" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone number</label>
                    <input type="text" name="phone_number" class="form-control" value="{{ customer.phone_number }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Discount percentage (%)</label>
                    <input type="number" name="percent" class="form-control" value="{{ customer.percent }}" min="0" max="100" required>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('customer_card.manage_customers') }}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-warning">Save changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
