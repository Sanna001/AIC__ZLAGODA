{% extends 'base.html' %}

{% block title %}Add Employee | ZLAGODA AIS{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">➕ Register new employee</h4>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('employees.add_employee') }}">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Surname</label>
                        <input type="text" name="empl_surname" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" name="empl_name" class="form-control" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Patronymic</label>
                        <input type="text" name="empl_patronymic" class="form-control">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Role</label>
                        <select name="empl_role" class="form-select" required>
                            <option value="Cashier">Cashier</option>
                            <option value="Manager">Manager</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Salary (UAH)</label>
                        <input type="number" name="salary" class="form-control" step="0.01" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Date of birth</label>
                        <input type="date" name="date_of_birth" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Date of employment</label>
                        <input type="date" name="date_of_start" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone_number" class="form-control" placeholder="+380..." required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">City</label>
                        <input type="text" name="city" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Street</label>
                        <input type="text" name="street" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Zip code</label>
                        <input type="text" name="zip_code" class="form-control" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('employees.list_employees') }}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-success">Save employee</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
